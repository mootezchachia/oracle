<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORACLE — Narrative Arbitrage Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   ORACLE v3 — World-Monitor Inspired Dashboard
   ═══════════════════════════════════════════════════════════════════════════ */

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-0: #030506;
  --bg-1: #0a0e13;
  --bg-2: #111820;
  --bg-3: #1a2332;
  --border: #1e2a3a;
  --border-bright: #2d4156;
  --text-0: #e8edf4;
  --text-1: #a0aec0;
  --text-2: #5a6a7e;
  --gold: #f0b429;
  --gold-dim: #b8860b;
  --green: #3fb950;
  --green-dim: #1a4d2e;
  --red: #f85149;
  --red-dim: #5c1d1a;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --orange: #f0883e;
  --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Mono', monospace;
}

html { font-size: 13px; }

body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 40px;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ─── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-2); }

/* ─── Header ─────────────────────────────────────────────────────────────── */

.header {
  background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 26px;
  height: 26px;
  background: conic-gradient(from 0deg, var(--gold), var(--orange), var(--gold));
  border-radius: 50%;
  animation: logo-pulse 3s ease-in-out infinite;
  box-shadow: 0 0 16px rgba(240,180,41,0.3);
}

@keyframes logo-pulse {
  0%, 100% { box-shadow: 0 0 16px rgba(240,180,41,0.3); }
  50% { box-shadow: 0 0 24px rgba(240,180,41,0.5); }
}

.logo-text {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 3px;
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--text-2);
  letter-spacing: 1px;
  margin-left: 8px;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  margin-left: 24px;
}

.nav-tab {
  padding: 6px 14px;
  font-size: 0.75rem;
  color: var(--text-2);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
  min-height: 44px;
  display: flex;
  align-items: center;
}

.nav-tab:hover { color: var(--text-1); border-color: var(--border); }
.nav-tab.active { color: var(--gold); border-color: var(--gold-dim); background: rgba(240,180,41,0.06); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--green);
  letter-spacing: 1px;
}

.live-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.5); }
  50% { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
}

.utc-clock {
  font-size: 0.75rem;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
}

.scan-btn {
  padding: 6px 14px;
  font-size: 0.7rem;
  font-family: var(--font);
  background: rgba(240,180,41,0.1);
  color: var(--gold);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
  min-height: 44px;
}

.scan-btn:hover { background: rgba(240,180,41,0.2); }
.scan-btn:active { transform: scale(0.96); }
.scan-btn.scanning { animation: scan-flash 0.5s ease infinite; }

@keyframes scan-flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ─── Ticker ─────────────────────────────────────────────────────────────── */

.ticker-bar {
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  height: 32px;
  overflow: hidden;
  position: relative;
}

.ticker-track {
  display: flex;
  align-items: center;
  height: 100%;
  animation: ticker-scroll 60s linear infinite;
  white-space: nowrap;
  will-change: transform;
}

.ticker-track:hover { animation-play-state: paused; }

@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  font-size: 0.7rem;
  color: var(--text-1);
  flex-shrink: 0;
}

.ticker-item .t-price {
  font-weight: 600;
}

.ticker-item .t-yes { color: var(--green); }
.ticker-item .t-no { color: var(--red); }
.ticker-sep { color: var(--border-bright); padding: 0 4px; flex-shrink: 0; }

/* ─── Loading ────────────────────────────────────────────────────────────── */

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.4s;
}

.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 0.8rem;
  color: var(--text-2);
  letter-spacing: 2px;
}

/* ─── Main Grid ──────────────────────────────────────────────────────────── */

.main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 16px;
}

.section-title {
  font-size: 0.7rem;
  color: var(--text-2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .count {
  background: var(--bg-3);
  color: var(--text-1);
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 0.65rem;
}

/* ─── Prediction Cards (Full Width) ──────────────────────────────────────── */

.predictions-section {
  margin-bottom: 24px;
}

.pred-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.pred-card:hover { border-color: var(--border-bright); }

.pred-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}

.pred-badge {
  padding: 6px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  flex-shrink: 0;
  min-height: 44px;
  display: flex;
  align-items: center;
}

.pred-badge.buy-yes {
  background: rgba(63,185,80,0.15);
  color: var(--green);
  border: 1px solid rgba(63,185,80,0.3);
}

.pred-badge.buy-no {
  background: rgba(248,81,73,0.15);
  color: var(--red);
  border: 1px solid rgba(248,81,73,0.3);
}

.pred-title-block {
  flex: 1;
  min-width: 0;
}

.pred-number {
  font-size: 0.65rem;
  color: var(--gold);
  letter-spacing: 1px;
}

.pred-market-link {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-0);
  text-decoration: none;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pred-market-link:hover { color: var(--blue); text-decoration: underline; }

.pred-edge {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
  text-shadow: 0 0 20px rgba(240,180,41,0.3);
}

.pred-edge-label {
  font-size: 0.6rem;
  color: var(--text-2);
  letter-spacing: 1px;
}

/* Prediction 3-column body */
.pred-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
}

.pred-col {
  padding: 16px 20px;
}

.pred-col:not(:last-child) {
  border-right: 1px solid var(--border);
}

.pred-col-label {
  font-size: 0.6rem;
  color: var(--text-2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Polymarket NOW column */
.pm-prices {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pm-price-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.pm-label {
  font-size: 0.7rem;
  color: var(--text-2);
  width: 28px;
}

.pm-bar-track {
  flex: 1;
  height: 20px;
  background: var(--bg-3);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.pm-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.pm-bar-fill.yes { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
.pm-bar-fill.no { background: linear-gradient(90deg, var(--red-dim), var(--red)); }

.pm-price-val {
  font-size: 0.85rem;
  font-weight: 600;
  width: 50px;
  text-align: right;
}

.pm-price-val.yes { color: var(--green); }
.pm-price-val.no { color: var(--red); }

/* ORACLE SAYS column */
.oracle-estimate {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 8px;
}

.oracle-narrative {
  font-size: 0.72rem;
  color: var(--text-1);
  line-height: 1.5;
  max-height: 80px;
  overflow: hidden;
}

.oracle-confidence {
  margin-top: 8px;
  font-size: 0.65rem;
  color: var(--text-2);
}

.oracle-confidence span { color: var(--purple); }

/* TRADE column */
.trade-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.trade-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
}

.trade-row .t-label { color: var(--text-2); }
.trade-row .t-val { color: var(--text-0); font-weight: 500; }

.trade-btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-align: center;
  text-decoration: none;
  border-radius: 4px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg-0);
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 44px;
}

.trade-btn:hover {
  box-shadow: 0 0 20px rgba(240,180,41,0.4);
  transform: translateY(-1px);
}

/* Prediction chart area */
.pred-chart-area {
  padding: 12px 20px 16px;
  background: var(--bg-2);
}

.pred-chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.pred-chart-legend {
  display: flex;
  gap: 16px;
  font-size: 0.65rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text-2);
}

.legend-line {
  width: 16px;
  height: 2px;
  border-radius: 1px;
}

.legend-line.live { background: var(--green); }
.legend-line.oracle { background: var(--gold); border-top: 2px dashed var(--gold); height: 0; }

.pred-canvas {
  width: 100%;
  height: 120px;
  display: block;
  border-radius: 4px;
}

/* ─── Data Grid (3 col) ──────────────────────────────────────────────────── */

.data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

/* ─── Card Base ──────────────────────────────────────────────────────────── */

.card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-body {
  max-height: 480px;
  overflow-y: auto;
}

/* ─── Markets Table ──────────────────────────────────────────────────────── */

.market-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(30,42,58,0.5);
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px;
}

.market-row:hover { background: var(--bg-2); }

.market-q {
  flex: 1;
  font-size: 0.75rem;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.price-badge {
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 600;
  flex-shrink: 0;
}

.price-badge.yes { background: rgba(63,185,80,0.12); color: var(--green); }
.price-badge.no { background: rgba(248,81,73,0.12); color: var(--red); }

.market-vol {
  font-size: 0.65rem;
  color: var(--text-2);
  flex-shrink: 0;
  width: 60px;
  text-align: right;
}

/* ─── Reddit Feed ────────────────────────────────────────────────────────── */

.reddit-item {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(30,42,58,0.5);
}

.reddit-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.reddit-sub {
  font-size: 0.6rem;
  color: var(--purple);
  background: rgba(188,140,255,0.1);
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}

.reddit-score {
  font-size: 0.65rem;
  color: var(--text-2);
}

.reddit-score .arrow { color: var(--orange); }

.reddit-title {
  font-size: 0.75rem;
  color: var(--text-1);
  line-height: 1.4;
}

.velocity-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 6px;
  transition: width 0.4s;
}

.velocity-bar.high { background: var(--red); }
.velocity-bar.mid { background: var(--orange); }
.velocity-bar.low { background: var(--blue); }

/* ─── News Feed ──────────────────────────────────────────────────────────── */

.news-item {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(30,42,58,0.5);
  cursor: pointer;
  transition: background 0.15s;
}

.news-item:hover { background: var(--bg-2); }

.news-source {
  font-size: 0.55rem;
  color: var(--blue);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.news-title {
  font-size: 0.75rem;
  color: var(--text-1);
  line-height: 1.4;
}

/* ─── Economic Data ──────────────────────────────────────────────────────── */

.econ-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(30,42,58,0.5);
}

.econ-name {
  font-size: 0.72rem;
  color: var(--text-1);
  flex: 1;
}

.econ-value {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-0);
  margin: 0 12px;
  font-variant-numeric: tabular-nums;
}

.econ-trend {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  min-width: 70px;
  justify-content: flex-end;
}

.econ-trend.up { color: var(--green); }
.econ-trend.down { color: var(--red); }
.econ-trend.flat { color: var(--text-2); }

/* ─── Status Bar ─────────────────────────────────────────────────────────── */

.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 0.65rem;
  color: var(--text-2);
  z-index: 100;
}

.status-dots {
  display: flex;
  gap: 16px;
}

.status-dot-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.status-dot.ok { background: var(--green); }
.status-dot.warn { background: var(--orange); }
.status-dot.err { background: var(--red); }

.status-right {
  display: flex;
  gap: 20px;
}

/* ─── Empty State ────────────────────────────────────────────────────────── */

.empty-state {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-2);
  font-size: 0.75rem;
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESPONSIVE — Tablet
   ═══════════════════════════════════════════════════════════════════════════ */

@media (max-width: 1100px) {
  .data-grid {
    grid-template-columns: 1fr 1fr;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESPONSIVE — Mobile
   ═══════════════════════════════════════════════════════════════════════════ */

@media (max-width: 768px) {
  html { font-size: 12px; }

  .header { padding: 0 12px; height: 48px; }
  .nav-tabs { display: none; }
  .logo-sub { display: none; }
  .utc-clock { display: none; }

  .ticker-bar { height: 28px; }
  .ticker-item { font-size: 0.6rem; padding: 0 12px; }

  .main { padding: 10px; }

  .data-grid { grid-template-columns: 1fr; }

  .pred-header {
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 14px;
  }

  .pred-edge { font-size: 1.3rem; }

  .pred-body {
    grid-template-columns: 1fr;
  }

  .pred-col:not(:last-child) {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  .pred-col { padding: 12px 14px; }

  .pred-chart-area { padding: 10px 14px 14px; }
  .pred-canvas { height: 100px; }

  .market-row { padding: 8px 12px; }
  .market-q { font-size: 0.7rem; }

  .status-bar { padding: 0 10px; }
  .status-dots { gap: 10px; }
  .status-right { gap: 12px; }
  /* Hide some status items on mobile */
  .status-dot-item:nth-child(n+3) { display: none; }
  .status-right span:nth-child(n+2) { display: none; }

  .card-body { max-height: 360px; }
}

/* ─── Utilities ──────────────────────────────────────────────────────────── */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Portfolio Section ──────────────────────────────────────────────────── */
.portfolio-section {
  width: 100%;
  margin-top: 24px;
}

.portfolio-header {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.portfolio-stat {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  text-align: center;
  transition: border-color 0.2s ease;
}

.portfolio-stat:hover {
  border-color: var(--border-bright);
}

.portfolio-stat.stat-highlight {
  border-top: 2px solid var(--gold);
}

.portfolio-stat .stat-value {
  font-size: 1.35rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-0);
  transition: color 0.3s ease;
}

.portfolio-stat .stat-value.pnl-pos { color: var(--green); }
.portfolio-stat .stat-value.pnl-neg { color: var(--red); }

.portfolio-stat .stat-label {
  font-size: 0.7rem;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

.portfolio-row .col-pnl .pnl-dollar.pnl-neg { color: var(--red); }

@media (max-width: 768px) {
  .portfolio-header {

  }
  .portfolio-stat:last-child {

  .portfolio-row {

  .portfolio-row .col-entry,
  .portfolio-row .col-current,
  .portfolio-row .col-value {
    display: none;
  }
  .portfolio-row.row-header .col-entry,
  .portfolio-row.row-header .col-current,
  .portfolio-row.row-header .col-value {

}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">INITIALIZING ORACLE</div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">ORACLE</span>
      <span class="logo-sub">NARRATIVE ARBITRAGE</span>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-section="all">ALL</button>
      <button class="nav-tab" data-section="predictions">PREDICTIONS</button>
      <button class="nav-tab" data-section="markets">MARKETS</button>
      <button class="nav-tab" data-section="signals">SIGNALS</button>
    </nav>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>LIVE</span>
    </div>
    <div class="utc-clock" id="utcClock">--:--:-- UTC</div>
    <button class="scan-btn" id="scanBtn" onclick="triggerScan()">SCAN</button>
  </div>
</header>

<!-- Ticker -->
<div class="ticker-bar">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item" style="color:var(--text-2)">Loading signals...</span>
  </div>
</div>

<!-- Main Content -->
<div class="main" id="mainContent" style="display:none">

  <!-- Predictions -->
  <section class="predictions-section" id="predictionsSection">
    <div class="section-title">ACTIVE PREDICTIONS <span class="count" id="predCount">0</span></div>
    <div id="predictionsContainer"></div>
  </section>

  <!-- Data Grid -->
  <div class="data-grid">
    <!-- Markets -->
    <div class="card" id="marketsCard">
      <div class="card-header">
        <div class="section-title" style="margin:0">POLYMARKET <span class="count" id="marketsCount">0</span></div>
      </div>
      <div class="card-body" id="marketsContainer"></div>
    </div>

    <!-- Reddit -->
    <div class="card" id="redditCard">
      <div class="card-header">
        <div class="section-title" style="margin:0">REDDIT SIGNALS <span class="count" id="redditCount">0</span></div>
      </div>
      <div class="card-body" id="redditContainer"></div>
    </div>

    <!-- News -->
    <div class="card" id="newsCard">
      <div class="card-header">
        <div class="section-title" style="margin:0">NEWS FEED <span class="count" id="newsCount">0</span></div>
      </div>
      <div class="card-body" id="newsContainer"></div>
    </div>
  </div>

  <!-- Portfolio -->
  <section class="portfolio-section" id="portfolioSection">
    <div class="section-title">PAPER TRADING PORTFOLIO <span class="count" id="portfolioCount">0</span></div>

    <!-- Account Summary Bar -->
    <div class="portfolio-header" id="portfolioHeader">
      <!-- Filled by JS -->
    </div>

    <!-- Positions Table -->
    <div class="card">
      <div class="card-header">
        <div class="section-title" style="margin:0">POSITIONS</div>
      </div>
      <div class="card-body" id="portfolioContainer"></div>
    </div>
  </section>

  <!-- Economic Data (full width below grid) -->
  <div style="margin-top:16px">
    <div class="card" id="fredCard">
      <div class="card-header">
        <div class="section-title" style="margin:0">ECONOMIC INDICATORS <span class="count" id="fredCount">0</span></div>
      </div>
      <div class="card-body" id="fredContainer"></div>
    </div>

</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-dots">
    <div class="status-dot-item"><div class="status-dot" id="dotMarkets"></div><span>MARKETS</span></div>
    <div class="status-dot-item"><div class="status-dot" id="dotReddit"></div><span>REDDIT</span></div>
    <div class="status-dot-item"><div class="status-dot" id="dotNews"></div><span>NEWS</span></div>
    <div class="status-dot-item"><div class="status-dot" id="dotFred"></div><span>FRED</span></div>
  </div>
  <div class="status-right">
    <span id="statusScans">SCANS: --</span>
    <span id="statusUpdate">LAST: --</span>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   ORACLE v3 — Dashboard Engine
   ═══════════════════════════════════════════════════════════════════════════ */

const state = {
  markets: [],
  reddit: [],
  news: [],
  fred: [],
  predictions: [],
  priceHistory: {},
  status: null,
  portfolio: null,
  firstLoad: true,
  pollTimer: null,
};

// ─── UTC Clock ────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2, '0');
  const m = String(now.getUTCMinutes()).padStart(2, '0');
  const s = String(now.getUTCSeconds()).padStart(2, '0');
  document.getElementById('utcClock').textContent = `${h}:${m}:${s} UTC`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── Nav Tabs ─────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const section = tab.dataset.section;
    const preds = document.getElementById('predictionsSection');
    const grid = document.querySelector('.data-grid');
    const econ = document.getElementById('fredCard').parentElement;

    if (section === 'all') {
      preds.style.display = ''; grid.style.display = ''; econ.style.display = '';
    } else if (section === 'predictions') {
      preds.style.display = ''; grid.style.display = 'none'; econ.style.display = 'none';
    } else if (section === 'markets') {
      preds.style.display = 'none'; grid.style.display = ''; econ.style.display = '';
    } else if (section === 'signals') {
      preds.style.display = 'none'; grid.style.display = ''; econ.style.display = '';
    }
  });
});

// ─── Scan Button ──────────────────────────────────────────────────────────
function triggerScan() {
  const btn = document.getElementById('scanBtn');
  btn.classList.add('scanning');
  btn.textContent = 'SCANNING';
  fetch('/api/scan', { method: 'POST' }).catch(() => {});
  setTimeout(() => {
    btn.classList.remove('scanning');
    btn.textContent = 'SCAN';
    fetchAllData();
  }, 5000);
}

// ─── Data Fetching ────────────────────────────────────────────────────────
async function fetchAllData() {
  const endpoints = [
    { key: 'markets', url: '/api/markets' },
    { key: 'reddit', url: '/api/reddit' },
    { key: 'news', url: '/api/news' },
    { key: 'fred', url: '/api/fred' },
    { key: 'predictions', url: '/api/predictions' },
    { key: 'priceHistory', url: '/api/price-history' },
    { key: 'status', url: '/api/status' },
    { key: 'portfolio', url: '/api/portfolio' },
  ];

  const results = await Promise.allSettled(
    endpoints.map(ep => fetch(ep.url).then(r => r.json()))
  );

  results.forEach((result, i) => {
    if (result.status === 'fulfilled' && result.value) {
      state[endpoints[i].key] = result.value;
    }
  });

  renderAll();

  if (state.firstLoad) {
    state.firstLoad = false;
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('mainContent').style.display = '';
    setTimeout(() => {
      document.getElementById('loadingOverlay').remove();
    }, 500);
  }
}

// ─── Render All ───────────────────────────────────────────────────────────
function renderAll() {
  renderTicker();
  renderPredictions();
  renderMarkets();
  renderReddit();
  renderNews();
  renderFred();
  renderPortfolio();
  renderStatus();
}

// ─── Ticker ───────────────────────────────────────────────────────────────
function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = [];

  // Markets for ticker
  const top = (state.markets || []).slice(0, 15);
  top.forEach(m => {
    const yes = m.outcomes?.find(o => o.name?.toLowerCase() === 'yes');
    const no = m.outcomes?.find(o => o.name?.toLowerCase() === 'no');
    const yp = yes ? yes.price.toFixed(1) : '--';
    const np = no ? no.price.toFixed(1) : '--';
    const q = (m.question || '').length > 50 ? m.question.slice(0, 47) + '...' : m.question;
    items.push(
      `<span class="ticker-item">${esc(q)} <span class="t-price t-yes">${yp}%</span> / <span class="t-price t-no">${np}%</span></span><span class="ticker-sep">|</span>`
    );
  });

  // Predictions
  (state.predictions || []).forEach(p => {
    if (p.primary_call) {
      const num = p.number ? `#${String(p.number).padStart(3,'0')}` : '';
      items.push(
        `<span class="ticker-item" style="color:var(--gold)">${num} ${esc(p.market || '')} &mdash; ${esc(p.primary_call.split('—')[0])}</span><span class="ticker-sep">|</span>`
      );
    }
  });

  if (items.length === 0) {
    track.innerHTML = '<span class="ticker-item" style="color:var(--text-2)">Awaiting data...</span>';
    return;
  }

  // Duplicate for seamless scroll
  const html = items.join('');
  track.innerHTML = html + html;
}

// ─── Predictions ──────────────────────────────────────────────────────────
function renderPredictions() {
  const container = document.getElementById('predictionsContainer');
  const preds = state.predictions || [];
  document.getElementById('predCount').textContent = preds.length;

  if (!preds.length) {
    container.innerHTML = '<div class="empty-state">No active predictions</div>';
    return;
  }

  // Sort by number descending
  const sorted = [...preds].sort((a, b) => (b.number || 0) - (a.number || 0));

  container.innerHTML = sorted.map((p, idx) => {
    const num = p.number ? `#${String(p.number).padStart(3, '0')}` : '';
    const url = p.url || '#';
    const direction = detectDirection(p);
    const isYes = direction === 'YES';

    // Parse prices
    const currentPrice = parsePrice(p.current_price);
    const targetPrice = parsePrice(p.target_price);
    const yesPrice = currentPrice;
    const noPrice = currentPrice !== null ? (100 - currentPrice) : null;

    // Parse oracle estimate
    let oracleEst = null;
    if (p.our_odds && p.our_odds.length) {
      const match = p.our_odds[0].match(/(\d+)%/);
      if (match) oracleEst = parseInt(match[1]);
    }

    // Edge calculation
    let edge = null;
    if (oracleEst !== null && currentPrice !== null) {
      if (isYes) {
        edge = oracleEst - currentPrice;
      } else {
        edge = (100 - oracleEst) - noPrice;
      }
    }

    const edgeAbs = edge !== null ? Math.abs(edge).toFixed(1) : '--';

    // Narrative
    const narrative = p.narrative || p.primary_call || '';
    const confidence = p.call ? p.call.match(/Confidence:\s*(\d+)/i) : null;
    const confVal = confidence ? confidence[1] : null;

    // Canvas ID
    const canvasId = `chart-pred-${p.number || idx}`;

    // Slug for price history
    const slug = findSlugForPred(p);

    return `
    <div class="pred-card fade-in">
      <div class="pred-header">
        <div class="pred-badge ${isYes ? 'buy-yes' : 'buy-no'}">
          BUY ${isYes ? 'YES' : 'NO'}
        </div>
        <div class="pred-title-block">
          <div class="pred-number">ORACLE ${num}</div>
          <a class="pred-market-link" href="${esc(url)}" target="_blank" rel="noopener">${esc(p.market || 'Unknown Market')}</a>
        </div>
        <div style="text-align:right">
          <div class="pred-edge">${edge !== null && edge > 0 ? '+' : ''}${edgeAbs}%</div>
          <div class="pred-edge-label">EDGE</div>
        </div>
      </div>

      <div class="pred-body">
        <!-- POLYMARKET NOW -->
        <div class="pred-col">
          <div class="pred-col-label">POLYMARKET NOW</div>
          <div class="pm-prices">
            <div class="pm-price-row">
              <span class="pm-label">YES</span>
              <div class="pm-bar-track">
                <div class="pm-bar-fill yes" style="width:${yesPrice ?? 50}%"></div>
              </div>
              <span class="pm-price-val yes">${yesPrice !== null ? yesPrice.toFixed(1) + '%' : '--'}</span>
            </div>
            <div class="pm-price-row">
              <span class="pm-label">NO</span>
              <div class="pm-bar-track">
                <div class="pm-bar-fill no" style="width:${noPrice ?? 50}%"></div>
              </div>
              <span class="pm-price-val no">${noPrice !== null ? noPrice.toFixed(1) + '%' : '--'}</span>
            </div>
          </div>
        </div>

        <!-- ORACLE SAYS -->
        <div class="pred-col">
          <div class="pred-col-label">ORACLE SAYS</div>
          <div class="oracle-estimate">${oracleEst !== null ? oracleEst + '% YES' : '--'}</div>
          <div class="oracle-narrative">${esc(narrative)}</div>
          ${confVal ? `<div class="oracle-confidence">CONFIDENCE <span>${confVal}/100</span></div>` : ''}
        </div>

        <!-- TRADE -->
        <div class="pred-col">
          <div class="pred-col-label">TRADE</div>
          <div class="trade-info">
            <div class="trade-row">
              <span class="t-label">ENTRY</span>
              <span class="t-val">${isYes
                ? (yesPrice !== null ? yesPrice.toFixed(1) + ' YES' : '--')
                : (noPrice !== null ? noPrice.toFixed(1) + ' NO' : '--')
              }</span>
            </div>
            <div class="trade-row">
              <span class="t-label">TARGET</span>
              <span class="t-val">${targetPrice !== null ? targetPrice + '' : '--'}</span>
            </div>
            <div class="trade-row">
              <span class="t-label">EDGE</span>
              <span class="t-val" style="color:var(--gold)">${edge !== null && edge > 0 ? '+' : ''}${edgeAbs} pts</span>
            </div>
            <a class="trade-btn" href="${esc(url)}" target="_blank" rel="noopener">TRADE ON POLYMARKET</a>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="pred-chart-area">
        <div class="pred-chart-header">
          <div class="pred-chart-legend">
            <div class="legend-item"><div class="legend-line live"></div> LIVE PRICE</div>
            <div class="legend-item"><div class="legend-line oracle"></div> ORACLE EST</div>
          </div>
        </div>
        <canvas class="pred-canvas" id="${canvasId}" data-slug="${esc(slug || '')}" data-oracle="${oracleEst || ''}"></canvas>
      </div>
    </div>`;
  }).join('');

  // Draw charts after DOM update
  requestAnimationFrame(() => {
    sorted.forEach((p, idx) => {
      const canvasId = `chart-pred-${p.number || idx}`;
      const canvas = document.getElementById(canvasId);
      if (canvas) drawPredChart(canvas);
    });
  });
}

function detectDirection(p) {
  const call = (p.primary_call || p.call || p.trade || '').toUpperCase();
  if (call.includes('BUY YES')) return 'YES';
  if (call.includes('BUY NO')) return 'NO';
  if (call.includes('SELL YES')) return 'NO';
  if (call.includes('SELL NO')) return 'YES';
  return 'NO';
}

function parsePrice(str) {
  if (!str) return null;
  const m = str.match(/([\d.]+)/);
  return m ? parseFloat(m[1]) : null;
}

function findSlugForPred(p) {
  const ph = state.priceHistory || {};
  const num = p.number;
  // Try matching by label number
  for (const [slug, data] of Object.entries(ph)) {
    const label = data.label || '';
    const lm = label.match(/#(\d+)/);
    if (lm && parseInt(lm[1]) === num) return slug;
  }
  // Try matching by market name
  const market = (p.market || '').toLowerCase();
  for (const [slug, data] of Object.entries(ph)) {
    if (slug.includes(market.split(' ')[0]?.toLowerCase())) return slug;
  }
  return null;
}

// ─── Chart Drawing ────────────────────────────────────────────────────────
function drawPredChart(canvas) {
  const slug = canvas.dataset.slug;
  const oracleEst = parseFloat(canvas.dataset.oracle);
  const ph = state.priceHistory || {};
  const data = ph[slug];
  const history = data?.history || [];

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  // Background
  ctx.fillStyle = '#0a0e13';
  ctx.fillRect(0, 0, W, H);

  // Grid
  const padL = 40, padR = 10, padT = 10, padB = 20;
  const gW = W - padL - padR;
  const gH = H - padT - padB;

  ctx.strokeStyle = '#1e2a3a';
  ctx.lineWidth = 0.5;

  // Y-axis: 0-100
  for (let v = 0; v <= 100; v += 25) {
    const y = padT + gH - (v / 100) * gH;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + gW, y);
    ctx.stroke();

    ctx.fillStyle = '#5a6a7e';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(v + '%', padL - 4, y + 3);
  }

  if (history.length < 2) {
    ctx.fillStyle = '#5a6a7e';
    ctx.font = '11px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('Collecting price data...', W / 2, H / 2);

    // Still draw oracle line if available
    if (!isNaN(oracleEst)) {
      const oy = padT + gH - (oracleEst / 100) * gH;
      ctx.strokeStyle = '#f0b429';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(padL, oy);
      ctx.lineTo(padL + gW, oy);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#f0b429';
      ctx.font = '9px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText('ORACLE ' + oracleEst + '%', padL + 4, oy - 4);
    }
    return;
  }

  // Map data
  const minTs = history[0].ts;
  const maxTs = history[history.length - 1].ts;
  const tsRange = maxTs - minTs || 1;

  // Live price line (green)
  ctx.strokeStyle = '#3fb950';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  history.forEach((pt, i) => {
    const x = padL + ((pt.ts - minTs) / tsRange) * gW;
    const y = padT + gH - (pt.price / 100) * gH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill under line
  const lastPt = history[history.length - 1];
  const lastX = padL + gW;
  const lastY = padT + gH - (lastPt.price / 100) * gH;
  ctx.lineTo(lastX, padT + gH);
  ctx.lineTo(padL, padT + gH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(63,185,80,0.06)';
  ctx.fill();

  // Oracle estimate line (gold dashed)
  if (!isNaN(oracleEst)) {
    const oy = padT + gH - (oracleEst / 100) * gH;
    ctx.strokeStyle = '#f0b429';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, oy);
    ctx.lineTo(padL + gW, oy);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#f0b429';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText('ORACLE ' + oracleEst + '%', padL + 4, oy - 4);
  }

  // Current price label
  ctx.fillStyle = '#3fb950';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'right';
  ctx.fillText('LIVE ' + lastPt.price.toFixed(1) + '%', padL + gW - 4, lastY - 4);

  // Time labels
  ctx.fillStyle = '#5a6a7e';
  ctx.font = '8px JetBrains Mono';
  ctx.textAlign = 'center';
  const startDate = new Date(minTs * 1000);
  const endDate = new Date(maxTs * 1000);
  ctx.fillText(fmtDateShort(startDate), padL, padT + gH + 14);
  ctx.fillText(fmtDateShort(endDate), padL + gW, padT + gH + 14);
}

function fmtDateShort(d) {
  const mo = d.toLocaleString('en', { month: 'short' });
  return `${mo} ${d.getDate()}`;
}

// ─── Markets ──────────────────────────────────────────────────────────────
function renderMarkets() {
  const container = document.getElementById('marketsContainer');
  const markets = state.markets || [];
  document.getElementById('marketsCount').textContent = markets.length;

  if (!markets.length) {
    container.innerHTML = '<div class="empty-state">No markets loaded</div>';
    return;
  }

  container.innerHTML = markets.map(m => {
    const yes = m.outcomes?.find(o => o.name?.toLowerCase() === 'yes');
    const no = m.outcomes?.find(o => o.name?.toLowerCase() === 'no');
    const yp = yes ? yes.price.toFixed(1) : '--';
    const np = no ? no.price.toFixed(1) : '--';
    const url = m.url || '#';
    const q = m.question || 'Unknown';

    return `
    <div class="market-row" onclick="window.open('${esc(url)}','_blank')">
      <span class="market-q" title="${esc(q)}">${esc(q)}</span>
      <span class="price-badge yes">${yp}%</span>
      <span class="price-badge no">${np}%</span>
      <span class="market-vol">${m.volume_fmt || ''}</span>
    </div>`;
  }).join('');
}

// ─── Reddit ───────────────────────────────────────────────────────────────
function renderReddit() {
  const container = document.getElementById('redditContainer');
  const items = state.reddit || [];
  document.getElementById('redditCount').textContent = items.length;

  if (!items.length) {
    container.innerHTML = '<div class="empty-state">No reddit signals</div>';
    return;
  }

  const maxVel = Math.max(...items.map(i => i.velocity || 0), 1);

  container.innerHTML = items.map(item => {
    const velPct = ((item.velocity || 0) / maxVel) * 100;
    const velClass = velPct > 70 ? 'high' : (velPct > 40 ? 'mid' : 'low');

    return `
    <div class="reddit-item">
      <div class="reddit-meta">
        <span class="reddit-sub">r/${esc(item.subreddit)}</span>
        <span class="reddit-score"><span class="arrow">&#9650;</span> ${fmtNum(item.score)}</span>
      </div>
      <div class="reddit-title">${esc(item.title)}</div>
      <div class="velocity-bar ${velClass}" style="width:${velPct.toFixed(0)}%"></div>
    </div>`;
  }).join('');
}

// ─── News ─────────────────────────────────────────────────────────────────
function renderNews() {
  const container = document.getElementById('newsContainer');
  const items = state.news || [];
  document.getElementById('newsCount').textContent = items.length;

  if (!items.length) {
    container.innerHTML = '<div class="empty-state">No news available</div>';
    return;
  }

  container.innerHTML = items.map(item => {
    const url = item.url || '#';
    return `
    <div class="news-item" onclick="window.open('${esc(url)}','_blank')">
      <div class="news-source">${esc(item.source || '')}</div>
      <div class="news-title">${esc(item.title || '')}</div>
    </div>`;
  }).join('');
}

// ─── FRED ─────────────────────────────────────────────────────────────────
function renderFred() {
  const container = document.getElementById('fredContainer');
  const items = state.fred || [];
  document.getElementById('fredCount').textContent = items.length;

  if (!items.length) {
    container.innerHTML = '<div class="empty-state">No economic data</div>';
    return;
  }

  container.innerHTML = items.map(item => {
    const dir = item.direction || 'flat';
    const arrow = dir === 'up' ? '&#9650;' : (dir === 'down' ? '&#9660;' : '&#9679;');
    const change = item.change || 0;
    const changeStr = change > 0 ? `+${change.toFixed(2)}` : change.toFixed(2);
    const val = typeof item.value === 'number' ? item.value.toFixed(2) : item.value;

    return `
    <div class="econ-item">
      <span class="econ-name">${esc(item.name || item.id)}</span>
      <span class="econ-value">${val}</span>
      <span class="econ-trend ${dir}">${arrow} ${changeStr}</span>
    </div>`;
  }).join('');
}

// ─── Portfolio ─────────────────────────────────────────────────────────────
function renderPortfolio() {
  const header = document.getElementById('portfolioHeader');
  const container = document.getElementById('portfolioContainer');
  const countEl = document.getElementById('portfolioCount');
  const data = state.portfolio;

  if (!data || !data.account) {
    container.innerHTML = '<div class="empty-state">Portfolio loading...</div>';
    return;
  }

  const a = data.account;
  const positions = data.positions || [];
  countEl.textContent = positions.length;

  const pnlClass = a.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
  const pnlSign = a.pnl >= 0 ? '+' : '';

  header.innerHTML = `
    <div class="portfolio-stat">
      <div class="stat-value">$${Number(a.starting_balance).toLocaleString()}</div>
      <div class="stat-label">Starting Balance</div>
    </div>
    <div class="portfolio-stat">
      <div class="stat-value">$${Number(a.cash).toLocaleString()}</div>
      <div class="stat-label">Cash</div>
    </div>
    <div class="portfolio-stat">
      <div class="stat-value">$${Number(a.positions_value).toLocaleString()}</div>
      <div class="stat-label">Positions Value</div>
    </div>
    <div class="portfolio-stat stat-highlight">
      <div class="stat-value ${pnlClass}">${pnlSign}$${Math.abs(a.pnl).toLocaleString()}</div>
      <div class="stat-label">Total P&L</div>
    </div>
    <div class="portfolio-stat stat-highlight">
      <div class="stat-value ${pnlClass}">${pnlSign}${a.pnl_pct.toFixed(2)}%</div>
      <div class="stat-label">Return</div>
    </div>
  `;

  if (positions.length === 0) {
    container.innerHTML = '<div class="empty-state">No open positions</div>';
    return;
  }

  const headerRow = `
    <div class="portfolio-row row-header">
      <div>#</div>
      <div>Market</div>
      <div>Side</div>
      <div class="col-entry">Entry</div>
      <div class="col-current">Current</div>
      <div class="col-value">Value</div>
      <div style="text-align:right">P&L</div>
    </div>`;

  const rows = positions.map(p => {
    const rowClass = p.pnl >= 0 ? 'row-winning' : 'row-losing';
    const sideClass = p.side.toLowerCase() === 'yes' ? 'side-yes' : 'side-no';
    const pClass = p.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const sign = p.pnl >= 0 ? '+' : '';

    return `
      <div class="portfolio-row ${rowClass}">
        <div class="pos-num">${p.number}</div>
        <div class="pos-question" title="${p.question}">${p.question}</div>
        <div><span class="side-badge ${sideClass}">${p.side.toUpperCase()}</span></div>
        <div class="col-price col-entry">$${p.entry_price.toFixed(2)}</div>
        <div class="col-price col-current">$${p.current_price.toFixed(2)}</div>
        <div class="col-value">$${p.current_value.toLocaleString()}</div>
        <div class="col-pnl">
          <span class="pnl-dollar ${pClass}">${sign}$${Math.abs(p.pnl).toLocaleString()}</span>
          <span class="pnl-badge ${pClass}">${sign}${p.pnl_pct.toFixed(1)}%</span>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `<div class="portfolio-table">${headerRow}${rows}</div>`;
}

// ─── Status ───────────────────────────────────────────────────────────────
function renderStatus() {
  const st = state.status;
  if (!st) return;

  // Dots
  const ages = st.cache_ages || {};
  const setDot = (id, key) => {
    const el = document.getElementById(id);
    if (!el) return;
    const age = ages[key];
    if (age === null || age === undefined) el.className = 'status-dot err';
    else if (age < 600) el.className = 'status-dot ok';
    else el.className = 'status-dot warn';
  };

  setDot('dotMarkets', 'markets');
  setDot('dotReddit', 'reddit');
  setDot('dotNews', 'news');
  setDot('dotFred', 'fred');

  document.getElementById('statusScans').textContent = `SCANS: ${st.scans || 0}`;

  if (st.last_scan) {
    const d = new Date(st.last_scan);
    const h = String(d.getUTCHours()).padStart(2, '0');
    const m = String(d.getUTCMinutes()).padStart(2, '0');
    document.getElementById('statusUpdate').textContent = `LAST: ${h}:${m} UTC`;
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function fmtNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

// ─── Init ─────────────────────────────────────────────────────────────────
fetchAllData();
setInterval(fetchAllData, 60000);
</script>
